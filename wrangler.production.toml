name = "orange-meets"

account_id = "c145c1bd5046a6996b5cde57e1c962c2"
main = "./build/index.js"
route = "meet.inglesconliza.com/*"
# https://developers.cloudflare.com/workers/platform/compatibility-dates
compatibility_date = "2024-10-07"
compatibility_flags = ["nodejs_compat"]

[site]
  bucket = "./public"

[[build.upload.rules]]
type = "ESModule"
globs = ["**/*.js"]

[[durable_objects.bindings]]
name = "rooms"
class_name = "ChatRoom"

[vars]
CALLS_APP_ID = "1ff13ac8f27014b77f7eb5bc178aceae"
TURN_SERVICE_ID = "46711d6c5759085dd70f599f6190ab94"
EXPERIMENTAL_SIMULCAST_ENABLED = "false"

# Indicate that you want the ChatRoom and RateLimiter classes to be callable as Durable Objects.
[[migrations]]
tag = "v1" # Should be unique for each entry
new_classes = ["ChatRoom", "RateLimiter"]

[[migrations]]
tag = "v2"
deleted_classes = ["RateLimiter"] 

[observability]
enabled = true

# The necessary secrets are:
# - CALLS_APP_SECRET
# Run `echo <VALUE> | wrangler secret put <NAME>` for each of these
